name: Build
permissions:
  contents: write
  pull-requests: write  # Required for PR artifact comments
on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      test-release:
        description: 'Run the release job (build + sign MSIX) without creating a GitHub Release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: followcursor/requirements.txt

      - name: Extract version
        id: version
        working-directory: followcursor
        shell: pwsh
        run: |
          $ver = python -c "exec(open('app/version.py').read()); print(__version__)"
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build artifact name
        id: artifact
        shell: pwsh
        run: |
          $base = "FollowCursor-${{ steps.version.outputs.APP_VERSION }}"
          if ("${{ github.event_name }}" -eq "pull_request") {
            $sha = "${{ github.event.pull_request.head.sha }}"
            $short = $sha.Substring(0, 7)
            $name = "$base-pr${{ github.event.pull_request.number }}-$short"
          } else {
            $name = "$base-windows"
          }
          echo "NAME=$name" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: followcursor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        working-directory: followcursor
        run: python -m pytest tests/ -v

      - name: Build with PyInstaller
        working-directory: followcursor
        run: |
          pyinstaller `
            --name "FollowCursor" `
            --windowed `
            --icon "followcursor.ico" `
            --noconfirm `
            --clean `
            --add-data "app;app" `
            --hidden-import "shiboken6" `
            --hidden-import "shiboken6.Shiboken" `
            --hidden-import "PySide6.QtSvg" `
            --hidden-import "mss" `
            --hidden-import "cv2" `
            --hidden-import "numpy" `
            --hidden-import "imageio_ffmpeg" `
            --exclude-module "PySide6.QtWebEngine" `
            --exclude-module "PySide6.QtWebEngineCore" `
            --exclude-module "PySide6.QtWebEngineWidgets" `
            --exclude-module "PySide6.QtWebChannel" `
            --exclude-module "PySide6.QtNetwork" `
            --exclude-module "PySide6.QtQml" `
            --exclude-module "PySide6.QtQuick" `
            --exclude-module "PySide6.QtQuickWidgets" `
            --exclude-module "PySide6.Qt3DCore" `
            --exclude-module "PySide6.Qt3DRender" `
            --exclude-module "PySide6.Qt3DInput" `
            --exclude-module "PySide6.Qt3DLogic" `
            --exclude-module "PySide6.Qt3DExtras" `
            --exclude-module "PySide6.Qt3DAnimation" `
            --exclude-module "PySide6.QtMultimedia" `
            --exclude-module "PySide6.QtMultimediaWidgets" `
            --exclude-module "PySide6.QtBluetooth" `
            --exclude-module "PySide6.QtNfc" `
            --exclude-module "PySide6.QtPositioning" `
            --exclude-module "PySide6.QtLocation" `
            --exclude-module "PySide6.QtSensors" `
            --exclude-module "PySide6.QtSerialPort" `
            --exclude-module "PySide6.QtTest" `
            --exclude-module "PySide6.QtCharts" `
            --exclude-module "PySide6.QtDataVisualization" `
            --exclude-module "PySide6.QtOpenGL" `
            --exclude-module "PySide6.QtOpenGLWidgets" `
            --exclude-module "PySide6.QtPdf" `
            --exclude-module "PySide6.QtPdfWidgets" `
            --exclude-module "PySide6.QtRemoteObjects" `
            --exclude-module "PySide6.QtScxml" `
            --exclude-module "PySide6.QtSql" `
            --exclude-module "PySide6.QtXml" `
            --exclude-module "PySide6.QtDesigner" `
            --exclude-module "PySide6.QtHelp" `
            --exclude-module "PySide6.QtUiTools" `
            --exclude-module "PySide6.QtConcurrent" `
            --exclude-module "PySide6.QtDBus" `
            --exclude-module "PySide6.QtStateMachine" `
            --exclude-module "PySide6.QtTextToSpeech" `
            --exclude-module "PySide6.QtHttpServer" `
            --exclude-module "PySide6.QtWebSockets" `
            --exclude-module "PySide6.QtSpatialAudio" `
            --exclude-module "PySide6.QtAsyncio" `
            --exclude-module "tkinter" `
            --exclude-module "unittest" `
            --exclude-module "email" `
            --exclude-module "http" `
            --exclude-module "xml" `
            --exclude-module "pydoc" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.NAME }}
          path: followcursor/dist/FollowCursor/
          retention-days: ${{ github.event_name == 'pull_request' && 7 || 30 }}

      - name: Comment PR with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const name = '${{ steps.artifact.outputs.NAME }}';
            const body = `### 📦 Build artifact ready\n\n` +
              `**${name}**\n\n` +
              `[Download from workflow run](${runUrl}#artifacts)`;

            // Delete previous bot comments to keep the PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('Build artifact ready')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.test-release == 'true')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        working-directory: followcursor
        shell: pwsh
        run: |
          $ver = python -c "exec(open('app/version.py').read()); print(__version__)"
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: FollowCursor-${{ steps.version.outputs.APP_VERSION }}-windows
          path: followcursor/dist/FollowCursor

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Pillow (for MSIX asset generation)
        run: pip install Pillow

      - name: Build MSIX (unsigned)
        working-directory: followcursor
        shell: pwsh
        run: |
          .\scripts\Build-Msix.ps1 `
            -Version "${{ steps.version.outputs.APP_VERSION }}" `
            -Publisher "${{ secrets.MSIX_PUBLISHER }}" `
            -SkipSign

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: FollowCursor-${{ steps.version.outputs.APP_VERSION }}-msix
          path: followcursor/dist/FollowCursor-${{ steps.version.outputs.APP_VERSION }}.msix
          retention-days: 30

      - name: Zip release artifact
        shell: pwsh
        run: |
          Compress-Archive -Path followcursor/dist/FollowCursor/* -DestinationPath "FollowCursor-${{ steps.version.outputs.APP_VERSION }}-windows.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FollowCursor ${{ steps.version.outputs.APP_VERSION }}
          generate_release_notes: true
          files: |
            FollowCursor-${{ steps.version.outputs.APP_VERSION }}-windows.zip
            followcursor/dist/FollowCursor-${{ steps.version.outputs.APP_VERSION }}.msix
