name: Squad CI
# Fast test for Squad workflow branches (no PyInstaller build).
# PRs to main are handled by build.yml which includes the full build pipeline.

on:
  pull_request:
    branches: [dev, preview, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: zumly/requirements.txt

      - name: Install dependencies
        working-directory: zumly
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: zumly
        run: python -m pytest tests/ -x -v

